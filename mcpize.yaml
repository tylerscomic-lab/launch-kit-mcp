version: 1
name: launch-kit-mcp
description: Product launch kit MCP — Product Hunt posts, landing page copy, launch emails, full launch strategies
runtime: typescript
entry: server.js
build:
  install: npm install
startCommand:
  type: http
  command: node server.js
  port: 8080
  healthCheck: /health
  mcpPath: /mcp
secrets:
  - name: GROQ_API_KEY
    required: true
